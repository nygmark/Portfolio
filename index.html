<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root {
      --bg-light: #fffaf0;
      --bg-dark: #2c2c2c;
      --card-light: #fff;
      --card-dark: #3b3b3b;
      --text-light: #333;
      --text-dark: #eee;
      --accent: #ffb6b9;
      --secondary: #cdb4db;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Quicksand', sans-serif;
    }

    body {
      background: var(--bg-light);
      color: var(--text-light);
      transition: 0.3s ease;
    }

    body.dark {
      background: var(--bg-dark);
      color: var(--text-dark);
    }

    header {
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--accent);
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .toggle-btn {
      background: white;
      color: var(--accent);
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    .top-section {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .profile {
      flex: 1;
      min-width: 250px;
      max-width: 300px;
      background: var(--card-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      border-radius: 15px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.05);
    }

    body.dark .profile {
      background: var(--card-dark);
    }

    .profile img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--accent);
    }

    .profile h1 {
      margin-top: 1rem;
      font-size: 1.8rem;
      color: var(--accent);
    }

    .stats {
      display: flex;
      justify-content: space-around;
      width: 100%;
      margin: 1rem 0;
    }

    .stat {
      text-align: center;
    }

    .stat b {
      font-size: 1.2rem;
    }

    .highlights {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .highlight {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--card-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--accent);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
    }

    body.dark .highlight {
      background: var(--card-dark);
    }

    .bio {
      flex: 2;
      min-width: 280px;
      max-width: 600px;
      padding: 2rem;
      background: var(--card-light);
      border-radius: 15px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.05);
    }

    body.dark .bio {
      background: var(--card-dark);
    }

    .bio h2 {
      color: var(--accent);
      margin-bottom: 1rem;
    }

    .bio p {
      line-height: 1.6;
    }

    .contacts {
      margin-top: 1.5rem;
      font-size: 1.2rem;
    }

    .contacts a {
      margin-right: 1rem;
      color: var(--accent);
      text-decoration: none;
      transition: color 0.3s;
    }

    .contacts a:hover {
      color: var(--secondary);
    }

    .gallery-section {
      padding: 2rem;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }

    .post {
      background: var(--card-light);
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      overflow: hidden;
      transition: 0.3s;
      display: block;
      text-decoration: none;
    }

    .post img {
      width: 100%;
      display: block;
    }

    .post:hover {
      transform: translateY(-5px);
    }

    body.dark .post {
      background: var(--card-dark);
    }

    footer {
      text-align: center;
      padding: 1rem;
      background: var(--accent);
      color: white;
      margin-top: 2rem;
    }

    @media (max-width: 768px) {
      .top-section {
        flex-direction: column;
        align-items: center;
      }

      .bio, .profile {
        width: 100%;
        max-width: none;
      }

      .gallery {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header>
    <h2>My Profile</h2>
    <button class="toggle-btn" onclick="toggleDarkMode()">Dark Mode</button>
  </header>

  <div class="top-section">
    <div class="profile">
      <img src="/img/mj.jpg" alt="Profile Picture">
      <h1>@fleurrboii</h1>
      <h4>Mark James Nanquil</h4>
      <div class="stats">
        <div class="stat"><b>4</b><br>Posts</div>
        <div class="stat"><b>6.9B</b><br>Followers</div>
        <div class="stat"><b>1</b><br>Following</div>
      </div>
      <div class="highlights">
        <div class="highlight">HTML</div>
        <div class="highlight">CSS</div>
        <div class="highlight">JS</div>
        <div class="highlight">UI</div>
      </div>
    </div>

    <div class="bio">
      <h2>About Me</h2>
      <p>
        i love my girlfriend
      </p>
      <br>
      <h6>Contacts:</h6>
      <div class="contacts">
        <a href="mailto: markjamesnanquil64@gmail.com"><i class="fas fa-envelope"></i></a>
        <a href="https://www.facebook.com/mmarkkjamess" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://www.instagram.com/fleurrboii?igsh=eTd5MTAyaHgyZmV2" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://github.com/nygmark" target="_blank"><i class="fab fa-github"></i></a>
      </div>
    </div>
  </div>

  <div class="gallery-section">
    <h2 style="text-align:center; color: var(--accent); margin-bottom: 1rem;">Posts</h2>
    <div class="gallery">
      <a class="post" href="/skills/skills.html" target="_blank">
        <img src="/img/skills.png" alt="Project 1">
        
      </a>
      <a class="post" href="/cert/certifications.html" target="_blank">
        <img src="/img/cert.png" alt="Project 2">
      </a>
      <a class="post" href="https://nygmark.github.io/ReviewHub/" target="_blank">
        <img src="/img/proj.png" alt="Project 3">
      </a>
      <a class="post" href="https://example.com/project4" target="_blank">
        <img src="/img/gallery.png" alt="Project 4">
      </a>
      <a class="post" href="https://example.com/project5" target="_blank">
        <img src="https://via.placeholder.com/300x200?text=Project+5" alt="Project 5">
      </a>
      <a class="post" href="https://example.com/project6" target="_blank">
        <img src="https://via.placeholder.com/300x200?text=Project+6" alt="Project 6">
      </a>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Nanquil</p>
  </footer>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
    }
  </script>
</body>
</html>
